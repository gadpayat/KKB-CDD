<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Engineering Unit Portal</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

html,body{
    width:100%;
    height:100%;
    overflow:hidden;
    background:transparent;
}

/* ===========================
   MAIN CONTAINER
=========================== */

.portal{
    width:100vw;
    height:100vh;
    position:relative;
}

/* ===========================
   TITLE
=========================== */

.title{

    position:absolute;
    top:25px;
    left:50%;

    transform:translateX(-50%);

    color:white;

    font-size:4rem;
    font-weight:700;

    text-shadow:
    0 0 10px white,
    0 0 25px white;

    z-index:100;
}

/* ===========================
   CENTER HUB
=========================== */

.hub{

    position:absolute;

    width:220px;
    height:220px;

    left:50%;
    top:50%;

    transform:translate(-50%,-50%);

    border-radius:50%;

    background:
    radial-gradient(circle at 30% 30%,
    #ffffff,
    #d9d9d9,
    #777777);

    display:flex;
    justify-content:center;
    align-items:center;

    box-shadow:
    inset 0 10px 15px rgba(255,255,255,.7),
    inset 0 -10px 15px rgba(0,0,0,.5),
    0 0 50px rgba(255,255,255,.3);

    z-index:5;
}

.hub span{
    font-size:28px;
    font-weight:bold;
    color:#00334d;
    text-align:center;
}

/* ===========================
   HARDHATS
=========================== */

.holder{
    position:absolute;
}

/* Top */

.h1{
    top:120px;
    left:50%;
    transform:translateX(-50%);
    animation:floating 5s ease-in-out infinite;
}

/* Right */

.h2{
    top:50%;
    right:120px;
    transform:translateY(-50%);
    animation:floating 6s ease-in-out infinite;
}

/* Bottom */

.h3{
    bottom:100px;
    left:50%;
    transform:translateX(-50%);
    animation:floating 7s ease-in-out infinite;
}

/* Left */

.h4{
    top:50%;
    left:120px;
    transform:translateY(-50%);
    animation:floating 5.5s ease-in-out infinite;
}

/* Floating Animation */

@keyframes floating{

    0%{
        transform:translateY(0px);
    }

    50%{
        transform:translateY(-18px);
    }

    100%{
        transform:translateY(0px);
    }

}

/* ===========================
   HARD HAT
=========================== */

.hardhat{

    width:180px;
    height:140px;

    border:none;
    cursor:pointer;

    position:relative;

    color:#00334d;

    font-size:20px;
    font-weight:bold;

    background:
    linear-gradient(
    180deg,
    #ffd84d,
    #ffb300
    );

    border-radius:
    90px 90px 45px 45px;

    box-shadow:
    inset 0 8px 15px rgba(255,255,255,.7),
    inset 0 -8px 15px rgba(0,0,0,.25),
    0 8px 25px rgba(0,0,0,.4);

    transition:.3s;
}

.hardhat:hover{

    transform:scale(1.08);

    box-shadow:
    0 0 25px gold,
    0 0 50px gold;

}

/* Hat Brim */

.hardhat::before{

    content:"";

    position:absolute;

    bottom:-18px;
    left:-10px;

    width:200px;
    height:30px;

    background:
    linear-gradient(
    180deg,
    #ffd84d,
    #ff9900
    );

    border-radius:20px;
}

/* Center Ridge */

.hardhat::after{

    content:"";

    position:absolute;

    top:10px;
    left:50%;

    transform:translateX(-50%);

    width:16px;
    height:85px;

    background:
    rgba(255,255,255,.3);

    border-radius:10px;
}

/* ===========================
   SUBMENU
=========================== */

.submenu{
    display:none;
    margin-top:25px;
}

.submenu.active{
    display:block;
}

.submenu a{

    display:block;

    width:190px;

    margin:6px auto;
    padding:10px;

    text-decoration:none;

    text-align:center;

    font-weight:bold;

    color:#00334d;

    border-radius:10px;

    background:
    linear-gradient(
    180deg,
    #ffffff,
    #dddddd
    );

    transition:.3s;
}

.submenu a:hover{

    transform:translateY(-3px);

    background:white;
}

/* ===========================
   SPARKS
=========================== */

.spark{

    position:absolute;

    width:4px;
    height:4px;

    border-radius:50%;

    background:white;

    box-shadow:
    0 0 10px white,
    0 0 20px white;

    animation:
    rise linear infinite;
}

@keyframes rise{

    from{
        transform:translateY(0px);
        opacity:1;
    }

    to{
        transform:translateY(-250px);
        opacity:0;
    }

}

/* ===========================
   MOBILE
=========================== */

@media(max-width:768px){

.title{
    font-size:2rem;
}

.hub{
    width:150px;
    height:150px;
}

.hub span{
    font-size:18px;
}

.hardhat{
    width:120px;
    height:90px;
    font-size:14px;
}

.hardhat::before{
    width:135px;
}

}

</style>
</head>

<body>

<div class="portal">

    <div class="title">
        Engineering Unit
    </div>

    <div class="hub">
        <span>ENGINEERING<br>UNIT</span>
    </div>

    <!-- Planning -->

    <div class="holder h1">

        <button class="hardhat"
        onclick="toggleMenu('m1')">
        Planning
        </button>

        <div class="submenu" id="m1">

            <a href="YOUR_LINK_HERE">Project Tracker</a>
            <a href="YOUR_LINK_HERE">Work Plan</a>
            <a href="YOUR_LINK_HERE">Pipeline</a>
            <a href="YOUR_LINK_HERE">Monitoring</a>
            <a href="YOUR_LINK_HERE">Reports</a>

        </div>

    </div>

    <!-- Design -->

    <div class="holder h2">

        <button class="hardhat"
        onclick="toggleMenu('m2')">
        Design
        </button>

        <div class="submenu" id="m2">

            <a href="YOUR_LINK_HERE">CAD Files</a>
            <a href="YOUR_LINK_HERE">Drawings</a>
            <a href="YOUR_LINK_HERE">Manuals</a>
            <a href="YOUR_LINK_HERE">Templates</a>
            <a href="YOUR_LINK_HERE">Specifications</a>

        </div>

    </div>

    <!-- Construction -->

    <div class="holder h3">

        <button class="hardhat"
        onclick="toggleMenu('m3')">
        Construction
        </button>

        <div class="submenu" id="m3">

            <a href="YOUR_LINK_HERE">Physical Progress</a>
            <a href="YOUR_LINK_HERE">Inspection</a>
            <a href="YOUR_LINK_HERE">Monitoring</a>
            <a href="YOUR_LINK_HERE">Photos</a>
            <a href="YOUR_LINK_HERE">Completion</a>

        </div>

    </div>

    <!-- Documents -->

    <div class="holder h4">

        <button class="hardhat"
        onclick="toggleMenu('m4')">
        Documents
        </button>

        <div class="submenu" id="m4">

            <a href="YOUR_LINK_HERE">Forms</a>
            <a href="YOUR_LINK_HERE">Templates</a>
            <a href="YOUR_LINK_HERE">Policies</a>
            <a href="YOUR_LINK_HERE">References</a>
            <a href="YOUR_LINK_HERE">Guidelines</a>

        </div>

    </div>

</div>

<script>

function toggleMenu(id){

document.querySelectorAll('.submenu')
.forEach(menu=>{

if(menu.id!==id){
menu.classList.remove('active');
}

});

document.getElementById(id)
.classList.toggle('active');

}

/* Floating Sparks */

for(let i=0;i<40;i++){

const spark=document.createElement("div");

spark.classList.add("spark");

spark.style.left=
Math.random()*window.innerWidth+"px";

spark.style.top=
window.innerHeight+"px";

spark.style.animationDuration=
(4+Math.random()*8)+"s";

spark.style.animationDelay=
Math.random()*8+"s";

document.body.appendChild(spark);

}

</script>

</body>
</html>
