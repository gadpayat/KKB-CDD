<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Engineering Unit Portal</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

html,body{
    width:100%;
    height:100%;
    overflow:hidden;
    background:transparent;
}

/* ===================================
   MAIN CONTAINER
=================================== */

.portal{
    width:100vw;
    height:100vh;
    position:relative;
}

/* ===================================
   TITLE
=================================== */

.title{

    position:absolute;
    top:30px;
    left:50%;

    transform:translateX(-50%);

    color:white;

    font-size:4rem;
    font-weight:700;

    text-shadow:
    0 0 10px white,
    0 0 30px white;

    z-index:1000;
}

/* ===================================
   CENTER HUB
=================================== */

.hub{

    position:absolute;

    width:220px;
    height:220px;

    left:50%;
    top:50%;

    transform:translate(-50%,-50%);

    border-radius:50%;

    background:
    radial-gradient(circle at 30% 30%,
    #ffffff,
    #d0d0d0,
    #6f6f6f);

    box-shadow:
    inset 0 10px 20px rgba(255,255,255,.8),
    inset 0 -15px 25px rgba(0,0,0,.5),
    0 0 60px rgba(255,255,255,.3);

    display:flex;
    justify-content:center;
    align-items:center;

    z-index:10;
}

.hub span{
    font-size:30px;
    font-weight:bold;
    color:#00334d;
    text-align:center;
}

/* ===================================
   ORBIT RINGS
=================================== */

.orbit-ring{

    position:absolute;

    left:50%;
    top:50%;

    transform:translate(-50%,-50%);

    width:700px;
    height:700px;

    border-radius:50%;

    border:2px dashed
    rgba(255,255,255,.15);

    animation:
    ringGlow 6s infinite alternate;
}

@keyframes ringGlow{

    from{
        box-shadow:
        0 0 10px rgba(255,255,255,.1);
    }

    to{
        box-shadow:
        0 0 40px rgba(255,255,255,.4);
    }
}

/* ===================================
   ORBIT SYSTEM
=================================== */

.orbit-system{

    position:absolute;

    width:700px;
    height:700px;

    left:50%;
    top:50%;

    transform:translate(-50%,-50%);

    animation:
    orbit 120s linear infinite;
}

@keyframes orbit{

    from{
        transform:
        translate(-50%,-50%)
        rotate(0deg);
    }

    to{
        transform:
        translate(-50%,-50%)
        rotate(360deg);
    }
}

/* ===================================
   GEAR HOLDERS
=================================== */

.gear-holder{
    position:absolute;
}

.g1{
    top:-85px;
    left:50%;
    transform:translateX(-50%);
}

.g2{
    right:-85px;
    top:50%;
    transform:translateY(-50%);
}

.g3{
    bottom:-85px;
    left:50%;
    transform:translateX(-50%);
}

.g4{
    left:-85px;
    top:50%;
    transform:translateY(-50%);
}

/* ===================================
   METALLIC GEAR
=================================== */

.gear{

    width:180px;
    height:180px;

    border:none;

    cursor:pointer;

    color:#00334d;

    font-weight:bold;
    font-size:20px;

    position:relative;

    background:
    radial-gradient(circle at 30% 30%,
    #ffffff,
    #dadada 20%,
    #b8b8b8 40%,
    #666 70%,
    #444);

    clip-path:polygon(
    50% 0%,58% 8%,68% 3%,76% 12%,
    88% 12%,92% 25%,100% 35%,
    95% 50%,100% 65%,92% 75%,
    88% 88%,76% 88%,68% 97%,
    58% 92%,50% 100%,42% 92%,
    32% 97%,24% 88%,12% 88%,
    8% 75%,0% 65%,5% 50%,
    0% 35%,8% 25%,12% 12%,
    24% 12%,32% 3%,42% 8%
    );

    box-shadow:
    inset 0 10px 15px rgba(255,255,255,.8),
    inset 0 -10px 15px rgba(0,0,0,.6),
    0 0 30px rgba(255,255,255,.2);

    animation:
    gearSpin 12s linear infinite;
}

@keyframes gearSpin{
    from{
        transform:rotate(0deg);
    }
    to{
        transform:rotate(-360deg);
    }
}

.gear:hover{

    box-shadow:
    0 0 50px cyan,
    0 0 100px cyan;

}

/* ===================================
   SUBMENU
=================================== */

.submenu{

    display:none;

    margin-top:15px;
}

.submenu.active{
    display:block;
}

.submenu a{

    display:block;

    width:190px;

    margin:6px auto;

    padding:12px;

    text-decoration:none;

    background:
    linear-gradient(
    180deg,
    #f5f5f5,
    #d9d9d9
    );

    color:#00334d;

    font-weight:bold;

    border-radius:10px;

    text-align:center;

    transition:.3s;
}

.submenu a:hover{
    transform:translateY(-3px);
}

/* ===================================
   SPARKS
=================================== */

.spark{

    position:absolute;

    width:4px;
    height:4px;

    border-radius:50%;

    background:white;

    box-shadow:
    0 0 10px white,
    0 0 20px white;

    animation:
    floatSpark linear infinite;
}

@keyframes floatSpark{

    from{
        transform:
        translateY(0px);
        opacity:1;
    }

    to{
        transform:
        translateY(-250px);
        opacity:0;
    }
}

/* ===================================
   MOBILE
=================================== */

@media(max-width:768px){

.title{
    font-size:2rem;
}

.orbit-ring,
.orbit-system{
    width:450px;
    height:450px;
}

.gear{
    width:120px;
    height:120px;
    font-size:14px;
}

.hub{
    width:150px;
    height:150px;
}

.hub span{
    font-size:20px;
}

}

</style>
</head>

<body>

<div class="portal">

    <div class="title">
        Engineering Unit
    </div>

    <div class="orbit-ring"></div>

    <div class="hub">
        <span>ENGINEERING<br>UNIT</span>
    </div>

    <div class="orbit-system">

        <!-- Planning -->

        <div class="gear-holder g1">

            <button class="gear"
            onclick="toggleMenu('m1')">
                Planning
            </button>

            <div class="submenu" id="m1">

                <a href="#">Tracker</a>
                <a href="#">Pipeline</a>
                <a href="#">Reports</a>
                <a href="#">Schedule</a>
                <a href="#">Monitoring</a>

            </div>

        </div>

        <!-- Design -->

        <div class="gear-holder g2">

            <button class="gear"
            onclick="toggleMenu('m2')">
                Design
            </button>

            <div class="submenu" id="m2">

                <a href="#">CAD</a>
                <a href="#">Drawings</a>
                <a href="#">Manuals</a>
                <a href="#">Templates</a>
                <a href="#">Specs</a>

            </div>

        </div>

        <!-- Construction -->

        <div class="gear-holder g3">

            <button class="gear"
            onclick="toggleMenu('m3')">
                Construction
            </button>

            <div class="submenu" id="m3">

                <a href="#">Progress</a>
                <a href="#">Photos</a>
                <a href="#">Inspection</a>
                <a href="#">Completion</a>
                <a href="#">Monitoring</a>

            </div>

        </div>

        <!-- Documents -->

        <div class="gear-holder g4">

            <button class="gear"
            onclick="toggleMenu('m4')">
                Documents
            </button>

            <div class="submenu" id="m4">

                <a href="#">Forms</a>
                <a href="#">Templates</a>
                <a href="#">Policies</a>
                <a href="#">References</a>
                <a href="#">Guidelines</a>

            </div>

        </div>

    </div>

</div>

<script>

/* Submenus */

function toggleMenu(id){

document.querySelectorAll('.submenu')
.forEach(menu=>{

if(menu.id!==id)
menu.classList.remove('active');

});

document
.getElementById(id)
.classList.toggle('active');
}

/* Floating Sparks */

for(let i=0;i<60;i++){

let spark=document.createElement("div");

spark.classList.add("spark");

spark.style.left=
Math.random()*window.innerWidth+"px";

spark.style.top=
window.innerHeight+"px";

spark.style.animationDuration=
(5+Math.random()*10)+"s";

spark.style.animationDelay=
Math.random()*10+"s";

document.body.appendChild(spark);
}

</script>

</body>
</html>
