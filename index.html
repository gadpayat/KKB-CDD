<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Engineering Unit Portal</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

html,body{
    width:100%;
    height:100%;
    background:transparent;
    overflow:hidden;
}

/* Transparent Overlay */

.portal-container{
    position:relative;
    width:100vw;
    height:100vh;
    background:transparent;
}

/* Title */

.title{
    position:absolute;
    top:30px;
    left:50%;
    transform:translateX(-50%);
    color:white;
    font-size:3rem;
    font-weight:bold;
    text-shadow:0 0 15px rgba(255,255,255,.8);
    z-index:100;
}

/* Orbit Ring */

.orbit-ring{
    position:absolute;
    top:50%;
    left:50%;
    width:700px;
    height:700px;
    transform:translate(-50%,-50%);
    border:2px dashed rgba(255,255,255,.2);
    border-radius:50%;
}

/* Orbit System */

.orbit-system{
    position:absolute;
    top:50%;
    left:50%;
    width:700px;
    height:700px;
    transform:translate(-50%,-50%);
    animation:orbit 120s linear infinite;
}

/* Orbit Motion */

@keyframes orbit{
    from{
        transform:translate(-50%,-50%) rotate(0deg);
    }
    to{
        transform:translate(-50%,-50%) rotate(360deg);
    }
}

/* Gear Position */

.gear-holder{
    position:absolute;
}

.gear1{
    top:-80px;
    left:50%;
    transform:translateX(-50%);
}

.gear2{
    right:-80px;
    top:50%;
    transform:translateY(-50%);
}

.gear3{
    bottom:-80px;
    left:50%;
    transform:translateX(-50%);
}

.gear4{
    left:-80px;
    top:50%;
    transform:translateY(-50%);
}

/* Metallic Gear */

.gear-btn{

    width:170px;
    height:170px;
    border:none;
    cursor:pointer;

    color:#002b45;
    font-size:20px;
    font-weight:bold;

    background:
    radial-gradient(circle at 30% 30%,
    #ffffff,
    #d7d7d7 25%,
    #bdbdbd 40%,
    #808080 70%,
    #3a3a3a);

    clip-path: polygon(
    50% 0%,58% 8%,70% 5%,75% 18%,90% 20%,
    88% 35%,100% 50%,88% 65%,90% 80%,
    75% 82%,70% 95%,58% 92%,50% 100%,
    42% 92%,30% 95%,25% 82%,10% 80%,
    12% 65%,0% 50%,12% 35%,10% 20%,
    25% 18%,30% 5%,42% 8%
    );

    box-shadow:
    inset 0 8px 15px rgba(255,255,255,.8),
    inset 0 -8px 15px rgba(0,0,0,.5),
    0 0 25px rgba(255,255,255,.4);

    animation:gearSpin 20s linear infinite;
}

@keyframes gearSpin{
    from{
        transform:rotate(0deg);
    }
    to{
        transform:rotate(-360deg);
    }
}

.gear-btn:hover{
    transform:scale(1.05);
}

/* Submenu */

.submenu{
    display:none;
    margin-top:10px;
    text-align:center;
}

.submenu.active{
    display:block;
}

.submenu a{

    display:block;
    width:190px;

    margin:5px auto;
    padding:10px;

    background:rgba(255,255,255,.9);
    color:#003366;

    text-decoration:none;
    font-weight:bold;

    border-radius:8px;

    transition:.3s;
}

.submenu a:hover{
    transform:translateY(-2px);
    background:white;
}

/* Mobile */

@media(max-width:768px){

.title{
    font-size:2rem;
}

.orbit-ring,
.orbit-system{
    width:500px;
    height:500px;
}

.gear-btn{
    width:120px;
    height:120px;
    font-size:14px;
}

}

</style>
</head>

<body>

<div class="portal-container">

    <div class="title">
        Engineering Unit
    </div>

    <div class="orbit-ring"></div>

    <div class="orbit-system">

        <!-- PLANNING -->

        <div class="gear-holder gear1">

            <button class="gear-btn"
            onclick="toggleMenu('menu1')">
            Planning
            </button>

            <div class="submenu" id="menu1">

                <a href="YOUR_LINK_HERE" target="_blank">Project Tracker</a>

                <a href="YOUR_LINK_HERE" target="_blank">Annual Work Plan</a>

                <a href="YOUR_LINK_HERE" target="_blank">Project Pipeline</a>

                <a href="YOUR_LINK_HERE" target="_blank">Monitoring</a>

                <a href="YOUR_LINK_HERE" target="_blank">Reports</a>

            </div>

        </div>

        <!-- DESIGN -->

        <div class="gear-holder gear2">

            <button class="gear-btn"
            onclick="toggleMenu('menu2')">
            Design
            </button>

            <div class="submenu" id="menu2">

                <a href="YOUR_LINK_HERE">CAD Files</a>

                <a href="YOUR_LINK_HERE">Drawings</a>

                <a href="YOUR_LINK_HERE">Specifications</a>

                <a href="YOUR_LINK_HERE">Templates</a>

                <a href="YOUR_LINK_HERE">Manuals</a>

            </div>

        </div>

        <!-- CONSTRUCTION -->

        <div class="gear-holder gear3">

            <button class="gear-btn"
            onclick="toggleMenu('menu3')">
            Construction
            </button>

            <div class="submenu" id="menu3">

                <a href="YOUR_LINK_HERE">Physical Progress</a>

                <a href="YOUR_LINK_HERE">Inspection</a>

                <a href="YOUR_LINK_HERE">Site Monitoring</a>

                <a href="YOUR_LINK_HERE">Photo Documentation</a>

                <a href="YOUR_LINK_HERE">Completion Report</a>

            </div>

        </div>

        <!-- DOCUMENTS -->

        <div class="gear-holder gear4">

            <button class="gear-btn"
            onclick="toggleMenu('menu4')">
            Documents
            </button>

            <div class="submenu" id="menu4">

                <a href="YOUR_LINK_HERE">Forms</a>

                <a href="YOUR_LINK_HERE">Templates</a>

                <a href="YOUR_LINK_HERE">Policies</a>

                <a href="YOUR_LINK_HERE">References</a>

                <a href="YOUR_LINK_HERE">Guidelines</a>

            </div>

        </div>

    </div>

</div>

<script>

function toggleMenu(menuId){

    document
    .querySelectorAll('.submenu')
    .forEach(menu=>{

        if(menu.id !== menuId){
            menu.classList.remove('active');
        }

    });

    document
    .getElementById(menuId)
    .classList.toggle('active');
}

</script>

</body>
</html>
