<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KKB-CDD Engineering Portal</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Segoe UI,sans-serif}
html,body{width:100%;height:100%;background:transparent;overflow:hidden}
.portal{position:relative;width:100vw;height:100vh}

/* Title */
.main-title{
position:absolute;top:60px;left:50%;transform:translateX(-50%);
font-size:4rem;font-weight:800;letter-spacing:8px;color:#fff;
text-shadow:0 0 10px rgba(255,255,255,.8),0 0 25px rgba(255,255,255,.6);
overflow:hidden;z-index:1000}
.main-title:after{
content:"";position:absolute;top:0;left:-150%;width:60%;height:100%;
background:linear-gradient(90deg,transparent,rgba(255,255,255,.95),transparent);
transform:skewX(-25deg);animation:titleSweep 5s linear infinite}
@keyframes titleSweep{from{left:-150%}to{left:250%}}

/* Grid */
.menu-grid{
position:absolute;top:55%;left:50%;transform:translate(-50%,-50%);
display:grid;grid-template-columns:220px 220px;gap:140px 180px}

/* Floating */
.holder{position:relative;animation:floating 6s ease-in-out infinite}
.holder:nth-child(1){animation-duration:5s}
.holder:nth-child(2){animation-duration:6s}
.holder:nth-child(3){animation-duration:7s}
.holder:nth-child(4){animation-duration:5.5s}
@keyframes floating{0%,100%{transform:translateY(0)}50%{transform:translateY(-18px)}}

/* Hardhat */
.hardhat{
width:180px;height:140px;border:none;cursor:pointer;position:relative;
overflow:hidden;color:#00334d;font-size:20px;font-weight:bold;
background:linear-gradient(180deg,#ffd84d,#ffb300);
border-radius:90px 90px 45px 45px;
box-shadow:inset 0 8px 15px rgba(255,255,255,.7),
inset 0 -8px 15px rgba(0,0,0,.25),0 8px 25px rgba(0,0,0,.4);
}
.hardhat:hover{transform:scale(1.05)}
.hardhat:before{
content:"";position:absolute;bottom:-18px;left:-10px;width:200px;height:30px;
background:linear-gradient(180deg,#ffd84d,#ff9900);border-radius:20px}
.hardhat:after{
content:"";position:absolute;top:10px;left:50%;transform:translateX(-50%);
width:16px;height:85px;background:rgba(255,255,255,.3);border-radius:10px}
.shine{
position:absolute;top:-50%;left:-150%;width:60px;height:250%;
background:linear-gradient(90deg,transparent,rgba(255,255,255,.9),transparent);
transform:rotate(25deg);animation:hatSweep 4s linear infinite}
@keyframes hatSweep{0%{left:-150%}100%{left:250%}}

/* Menu */
.submenu{display:none;margin-top:25px}
.submenu.active{display:block}
.submenu a{
display:block;width:190px;margin:6px auto;padding:10px;text-decoration:none;
text-align:center;font-weight:bold;color:#00334d;border-radius:10px;
background:linear-gradient(180deg,#fff,#ddd)}
.submenu a:hover{transform:translateY(-2px)}

/* Sparks */
.spark{
position:absolute;width:4px;height:4px;border-radius:50%;background:#fff;
box-shadow:0 0 10px #fff,0 0 20px #fff;animation:rise linear infinite}
@keyframes rise{from{transform:translateY(0);opacity:1}to{transform:translateY(-250px);opacity:0}}

@media(max-width:768px){
.main-title{font-size:2rem}
.menu-grid{grid-template-columns:1fr;gap:90px;top:60%}
}
</style>
</head>
<body>
<div class="portal">
<div class="main-title">KKB-CDD</div>

<div class="menu-grid">

<div class="holder">
<button class="hardhat" onclick="toggleMenu('m1')"><div class="shine"></div>Planning</button>
<div class="submenu" id="m1">
<a href="#">Project Tracker</a>
<a href="#">Work Plan</a>
<a href="#">Pipeline</a>
<a href="#">Monitoring</a>
<a href="#">Reports</a>
</div>
</div>

<div class="holder">
<button class="hardhat" onclick="toggleMenu('m2')"><div class="shine"></div>Design</button>
<div class="submenu" id="m2">
<a href="#">CAD Files</a>
<a href="#">Drawings</a>
<a href="#">Manuals</a>
<a href="#">Templates</a>
<a href="#">Specifications</a>
</div>
</div>

<div class="holder">
<button class="hardhat" onclick="toggleMenu('m3')"><div class="shine"></div>Construction</button>
<div class="submenu" id="m3">
<a href="#">Progress</a>
<a href="#">Inspection</a>
<a href="#">Monitoring</a>
<a href="#">Photos</a>
<a href="#">Completion</a>
</div>
</div>

<div class="holder">
<button class="hardhat" onclick="toggleMenu('m4')"><div class="shine"></div>Documents</button>
<div class="submenu" id="m4">
<a href="#">Forms</a>
<a href="#">Templates</a>
<a href="#">Policies</a>
<a href="#">References</a>
<a href="#">Guidelines</a>
</div>
</div>

</div>
</div>

<script>
function toggleMenu(id){
document.querySelectorAll('.submenu').forEach(m=>{
if(m.id!==id)m.classList.remove('active');
});
document.getElementById(id).classList.toggle('active');
}

for(let i=0;i<40;i++){
const s=document.createElement('div');
s.className='spark';
s.style.left=Math.random()*window.innerWidth+'px';
s.style.top=window.innerHeight+'px';
s.style.animationDuration=(4+Math.random()*8)+'s';
s.style.animationDelay=Math.random()*8+'s';
document.body.appendChild(s);
}
</script>
</body>
</html>
