<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KKB-CDD Engineering Portal</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

html,body{
width:100%;
height:100%;
background:transparent;
overflow:hidden;
}

.portal{
position:relative;
width:100vw;
height:100vh;
overflow:hidden;
}

/* ==========================
   WELDING SPARKS
========================== */

#welding-zone{
position:absolute;
inset:0;
pointer-events:none;
overflow:hidden;
z-index:1;
}

.weld-spark{
position:absolute;
width:3px;
height:3px;
border-radius:50%;
background:#fff8c6;
opacity:0;

box-shadow:
0 0 4px #fff,
0 0 8px #ffd700,
0 0 16px #ff9500;

animation:weldFly linear forwards;
}

@keyframes weldFly{
0%{
transform:translate(0,0) scale(1);
opacity:1;
}
15%{
opacity:1;
}
100%{
transform:
translate(
calc(var(--dx) * 1px),
calc(var(--dy) * 1px)
)
scale(.15);
opacity:0;
}
}

/* ==========================
   TITLE
========================== */

.main-title{
position:absolute;
top:50px;
left:50%;
transform:translateX(-50%);
font-size:4rem;
font-weight:800;
letter-spacing:8px;
color:#fff;

text-shadow:
0 0 10px rgba(255,255,255,.8),
0 0 30px rgba(255,255,255,.6);

overflow:hidden;
z-index:1000;
}

.main-title::after{
content:"";
position:absolute;
top:0;
left:-150%;
width:60%;
height:100%;

background:
linear-gradient(
90deg,
transparent,
rgba(255,255,255,.95),
transparent
);

transform:skewX(-25deg);
animation:titleSweep 5s linear infinite;
}

@keyframes titleSweep{
from{left:-150%;}
to{left:250%;}
}

/* ==========================
   MENU GRID
========================== */

.menu-grid{
position:absolute;
top:58%;
left:50%;
transform:translate(-50%,-50%);
display:grid;
grid-template-columns:220px 220px;
gap:140px 180px;
z-index:100;
}

/* ==========================
   FLOATING HOLDERS
========================== */

.holder{
position:relative;
animation:floating 6s ease-in-out infinite;
}

.holder:nth-child(1){animation-duration:5s;}
.holder:nth-child(2){animation-duration:6s;}
.holder:nth-child(3){animation-duration:7s;}
.holder:nth-child(4){animation-duration:5.5s;}

@keyframes floating{
0%,100%{
transform:translateY(0);
}
50%{
transform:translateY(-18px);
}
}

/* ==========================
   HARDHAT
========================== */

.hardhat{
width:190px;
height:110px;

border:none;
cursor:pointer;
position:relative;
overflow:hidden;

color:#00334d;
font-size:18px;
font-weight:700;

display:flex;
justify-content:center;
align-items:center;

background:
linear-gradient(
180deg,
#ffe57a 0%,
#ffc933 35%,
#ffae00 100%
);

border-radius:
120px 90px 50px 30px /
90px 90px 40px 40px;

box-shadow:
inset 0 8px 12px rgba(255,255,255,.6),
inset 0 -10px 12px rgba(0,0,0,.18),
0 10px 25px rgba(0,0,0,.35);

transition:.3s;
}

.hardhat:hover{
transform:scale(1.05);
box-shadow:
0 0 20px rgba(255,215,0,.8),
0 0 40px rgba(255,215,0,.4);
}

.hardhat::before{
content:"";
position:absolute;
right:-18px;
bottom:12px;
width:70px;
height:18px;

background:
linear-gradient(
180deg,
#ffcf40,
#ff9900
);

border-radius:0 20px 20px 0;
}

.hardhat::after{
content:"";
position:absolute;
left:-8px;
bottom:8px;
width:45px;
height:22px;

background:
linear-gradient(
180deg,
#ffcf40,
#ff9900
);

border-radius:20px 0 0 20px;
}

.ridge{
position:absolute;
left:45px;
top:10px;
width:14px;
height:85px;
border-radius:10px;
background:rgba(255,255,255,.25);
}

.shine{
position:absolute;
top:-50%;
left:-150%;
width:60px;
height:250%;

background:
linear-gradient(
90deg,
transparent,
rgba(255,255,255,.9),
transparent
);

transform:rotate(25deg);
animation:hatSweep 4s linear infinite;
}

@keyframes hatSweep{
0%{left:-150%;}
100%{left:250%;}
}

/* ==========================
   SUBMENUS
========================== */

.submenu{
display:none;
margin-top:25px;
}

.submenu.active{
display:block;
}

.submenu a{
display:block;
width:190px;
margin:6px auto;
padding:10px;

text-decoration:none;
text-align:center;
font-weight:bold;

color:#00334d;

border-radius:10px;

background:
linear-gradient(
180deg,
#ffffff,
#dddddd
);
}

/* ==========================
   MOBILE
========================== */

@media(max-width:768px){

.main-title{
font-size:2rem;
}

.menu-grid{
grid-template-columns:1fr;
gap:90px;
top:60%;
}

}
</style>
</head>

<body>

<div class="portal">

<div id="welding-zone"></div>

<div class="main-title">
KKB-CDD
</div>

<div class="menu-grid">

<div class="holder">
<button class="hardhat" onclick="toggleMenu('m1')">
<div class="shine"></div>
<div class="ridge"></div>
Planning
</button>

<div class="submenu" id="m1">
<a href="#">Project Tracker</a>
<a href="#">Work Plan</a>
<a href="#">Pipeline</a>
<a href="#">Monitoring</a>
<a href="#">Reports</a>
</div>
</div>

<div class="holder">
<button class="hardhat" onclick="toggleMenu('m2')">
<div class="shine"></div>
<div class="ridge"></div>
Design
</button>

<div class="submenu" id="m2">
<a href="#">CAD Files</a>
<a href="#">Drawings</a>
<a href="#">Manuals</a>
<a href="#">Templates</a>
<a href="#">Specifications</a>
</div>
</div>

<div class="holder">
<button class="hardhat" onclick="toggleMenu('m3')">
<div class="shine"></div>
<div class="ridge"></div>
Construction
</button>

<div class="submenu" id="m3">
<a href="#">Progress</a>
<a href="#">Inspection</a>
<a href="#">Monitoring</a>
<a href="#">Photos</a>
<a href="#">Completion</a>
</div>
</div>

<div class="holder">
<button class="hardhat" onclick="toggleMenu('m4')">
<div class="shine"></div>
<div class="ridge"></div>
Documents
</button>

<div class="submenu" id="m4">
<a href="#">Forms</a>
<a href="#">Templates</a>
<a href="#">Policies</a>
<a href="#">References</a>
<a href="#">Guidelines</a>
</div>
</div>

</div>
</div>

<script>

function toggleMenu(id){

document.querySelectorAll('.submenu').forEach(menu=>{
if(menu.id!==id){
menu.classList.remove('active');
}
});

document.getElementById(id).classList.toggle('active');
}

/* ==========================
   WELDING SPARKS
========================== */

const weldZone =
document.getElementById('welding-zone');

const weldingPoints = [
{x:0.12,y:0.80},
{x:0.85,y:0.25},
{x:0.50,y:0.92}
];

function createWeldBurst(){

const p =
weldingPoints[
Math.floor(Math.random()*weldingPoints.length)
];

const sourceX =
window.innerWidth * p.x;

const sourceY =
window.innerHeight * p.y;

for(let i=0;i<18;i++){

const spark =
document.createElement('div');

spark.className='weld-spark';

spark.style.left =
sourceX + 'px';

spark.style.top =
sourceY + 'px';

const angle =
(-95 + Math.random()*80)
* (Math.PI/180);

const distance =
80 + Math.random()*260;

spark.style.setProperty(
'--dx',
Math.cos(angle)*distance
);

spark.style.setProperty(
'--dy',
Math.sin(angle)*distance
);

spark.style.animationDuration =
(0.5 + Math.random()*0.8) + 's';

weldZone.appendChild(spark);

spark.addEventListener(
'animationend',
()=>spark.remove()
);
}
}

setInterval(createWeldBurst,120);

</script>

</body>
</html>
