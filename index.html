```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Engineering Unit Portal</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

html,body{
    width:100%;
    height:100%;
    background:transparent;
    overflow:hidden;
}

/* Main Container */

.portal{
    width:100vw;
    height:100vh;
    position:relative;
}

/* 2x2 Centered Layout */

.menu-grid{

    position:absolute;

    top:50%;
    left:50%;

    transform:translate(-50%,-50%);

    display:grid;

    grid-template-columns:
    repeat(2,220px);

    grid-template-rows:
    repeat(2,220px);

    gap:140px;

    justify-content:center;
    align-items:center;
}

/* Floating Animation */

.holder{

    position:relative;

    animation:
    floating 6s ease-in-out infinite;
}

.holder:nth-child(1){
    animation-duration:5s;
}

.holder:nth-child(2){
    animation-duration:6s;
}

.holder:nth-child(3){
    animation-duration:7s;
}

.holder:nth-child(4){
    animation-duration:5.5s;
}

@keyframes floating{

    0%{
        transform:translateY(0px);
    }

    50%{
        transform:translateY(-20px);
    }

    100%{
        transform:translateY(0px);
    }
}

/* Hard Hat */

.hardhat{

    width:180px;
    height:140px;

    border:none;
    cursor:pointer;

    position:relative;

    color:#00334d;
    font-size:20px;
    font-weight:bold;

    background:
    linear-gradient(
    180deg,
    #ffd84d,
    #ffb300
    );

    border-radius:
    90px 90px 45px 45px;

    box-shadow:
    inset 0 8px 15px rgba(255,255,255,.7),
    inset 0 -8px 15px rgba(0,0,0,.25),
    0 8px 25px rgba(0,0,0,.4);

    transition:.3s;
}

.hardhat:hover{

    transform:scale(1.08);

    box-shadow:
    0 0 25px gold,
    0 0 50px gold;
}

/* Hat Brim */

.hardhat::before{

    content:"";

    position:absolute;

    bottom:-18px;
    left:-10px;

    width:200px;
    height:30px;

    background:
    linear-gradient(
    180deg,
    #ffd84d,
    #ff9900
    );

    border-radius:20px;
}

/* Hat Ridge */

.hardhat::after{

    content:"";

    position:absolute;

    top:10px;
    left:50%;

    transform:translateX(-50%);

    width:16px;
    height:85px;

    background:
    rgba(255,255,255,.3);

    border-radius:10px;
}

/* Submenus */

.submenu{
    display:none;
    margin-top:25px;
}

.submenu.active{
    display:block;
}

.submenu a{

    display:block;

    width:190px;

    margin:6px auto;

    padding:10px;

    text-align:center;

    text-decoration:none;

    font-weight:bold;

    color:#00334d;

    border-radius:10px;

    background:
    linear-gradient(
    180deg,
    #ffffff,
    #dddddd
    );

    transition:.3s;
}

.submenu a:hover{

    transform:translateY(-3px);

    background:white;
}

/* Floating Sparks */

.spark{

    position:absolute;

    width:4px;
    height:4px;

    border-radius:50%;

    background:white;

    box-shadow:
    0 0 10px white,
    0 0 20px white;

    animation:
    rise linear infinite;
}

@keyframes rise{

    from{
        transform:translateY(0px);
        opacity:1;
    }

    to{
        transform:translateY(-250px);
        opacity:0;
    }
}

/* Mobile */

@media(max-width:768px){

.menu-grid{

    grid-template-columns:1fr;

    grid-template-rows:auto;

    gap:90px;
}

.hardhat{

    width:140px;
    height:105px;

    font-size:15px;
}

.hardhat::before{
    width:160px;
}

}

</style>
</head>

<body>

<div class="portal">

<div class="menu-grid">

    <!-- Planning -->

    <div class="holder">

        <button class="hardhat"
        onclick="toggleMenu('m1')">
        Planning
        </button>

        <div class="submenu" id="m1">

            <a href="YOUR_LINK_HERE" target="_blank">Project Tracker</a>
            <a href="YOUR_LINK_HERE" target="_blank">Work Plan</a>
            <a href="YOUR_LINK_HERE" target="_blank">Pipeline</a>
            <a href="YOUR_LINK_HERE" target="_blank">Monitoring</a>
            <a href="YOUR_LINK_HERE" target="_blank">Reports</a>

        </div>

    </div>

    <!-- Design -->

    <div class="holder">

        <button class="hardhat"
        onclick="toggleMenu('m2')">
        Design
        </button>

        <div class="submenu" id="m2">

            <a href="YOUR_LINK_HERE" target="_blank">CAD Files</a>
            <a href="YOUR_LINK_HERE" target="_blank">Drawings</a>
            <a href="YOUR_LINK_HERE" target="_blank">Manuals</a>
            <a href="YOUR_LINK_HERE" target="_blank">Templates</a>
            <a href="YOUR_LINK_HERE" target="_blank">Specifications</a>

        </div>

    </div>

    <!-- Construction -->

    <div class="holder">

        <button class="hardhat"
        onclick="toggleMenu('m3')">
        Construction
        </button>

        <div class="submenu" id="m3">

            <a href="YOUR_LINK_HERE" target="_blank">Physical Progress</a>
            <a href="YOUR_LINK_HERE" target="_blank">Inspection</a>
            <a href="YOUR_LINK_HERE" target="_blank">Monitoring</a>
            <a href="YOUR_LINK_HERE" target="_blank">Photos</a>
            <a href="YOUR_LINK_HERE" target="_blank">Completion</a>

        </div>

    </div>

    <!-- Documents -->

    <div class="holder">

        <button class="hardhat"
        onclick="toggleMenu('m4')">
        Documents
        </button>

        <div class="submenu" id="m4">

            <a href="YOUR_LINK_HERE" target="_blank">Forms</a>
            <a href="YOUR_LINK_HERE" target="_blank">Templates</a>
            <a href="YOUR_LINK_HERE" target="_blank">Policies</a>
            <a href="YOUR_LINK_HERE" target="_blank">References</a>
            <a href="YOUR_LINK_HERE" target="_blank">Guidelines</a>

        </div>

    </div>

</div>

</div>

<script>

/* Toggle Menus */

function toggleMenu(id){

document.querySelectorAll('.submenu')
.forEach(menu=>{

if(menu.id!==id){
menu.classList.remove('active');
}

});

document.getElementById(id)
.classList.toggle('active');
}

/* Floating Sparks */

for(let i=0;i<40;i++){

const spark=document.createElement("div");

spark.classList.add("spark");

spark.style.left=
Math.random()*window.innerWidth+"px";

spark.style.top=
window.innerHeight+"px";

spark.style.animationDuration=
(4+Math.random()*8)+"s";

spark.style.animationDelay=
Math.random()*8+"s";

document.body.appendChild(spark);
}

</script>

</body>
</html>
```
